<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinFix Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#0f1117',
            card: '#1a1d27',
            border: '#2a2d3a',
            accent: '#6366f1',
            success: '#22c55e',
            warning: '#f59e0b',
            danger: '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f1117; font-family: 'Inter', system-ui, sans-serif; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    .mono { font-family: 'JetBrains Mono', monospace; }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .gradient-border {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #a855f7);
      padding: 1px;
      border-radius: 0.75rem;
    }
    .gradient-border > div { background: #1a1d27; border-radius: calc(0.75rem - 1px); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1d27; }
    ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
  </style>
</head>
<body class="dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, AreaChart, Area } = Recharts;

    // === CONFIG ===
    const WEBHOOK_URL = 'http://localhost:5678/webhook/finfix/stats';
    const POLL_INTERVAL = 10000;

    // === COMPONENTS ===

    function StatCard({ label, value, subtext, color = 'text-white', icon }) {
      return (
        <div className="gradient-border">
          <div className="p-5">
            <div className="flex items-center justify-between mb-2">
              <span className="text-gray-400 text-sm font-medium">{label}</span>
              <span className="text-lg">{icon}</span>
            </div>
            <div className={`text-3xl font-bold ${color} mono`}>{value}</div>
            {subtext && <div className="text-gray-500 text-xs mt-1">{subtext}</div>}
          </div>
        </div>
      );
    }

    function WalletCard({ name, balance, role }) {
      const balNum = parseFloat(balance) || 0;
      const color = balNum < 10 ? 'text-danger' : balNum < 50 ? 'text-warning' : 'text-success';
      return (
        <div className="bg-card border border-border rounded-lg p-4">
          <div className="flex items-center justify-between">
            <div>
              <div className="text-white font-semibold text-sm">{name}</div>
              <div className="text-gray-500 text-xs">{role}</div>
            </div>
            <div className={`mono text-lg font-bold ${color}`}>
              ${balNum.toFixed(2)}
            </div>
          </div>
        </div>
      );
    }

    function FixTypeBadge({ type }) {
      const styles = {
        DATA_FIX: 'bg-blue-500/20 text-blue-400 border-blue-500/30',
        CHECKOUT_FIX: 'bg-purple-500/20 text-purple-400 border-purple-500/30',
        PAYMENT_FIX: 'bg-amber-500/20 text-amber-400 border-amber-500/30',
        DIRECT: 'bg-green-500/20 text-green-400 border-green-500/30',
        NONE: 'bg-gray-500/20 text-gray-400 border-gray-500/30',
      };
      const labels = {
        DATA_FIX: 'Data Fix',
        CHECKOUT_FIX: 'Checkout Fix',
        PAYMENT_FIX: 'Payment Fix',
        DIRECT: 'Direct',
        NONE: 'No Fix',
      };
      return (
        <span className={`px-2 py-0.5 rounded-full text-xs font-medium border ${styles[type] || styles.NONE}`}>
          {labels[type] || type}
        </span>
      );
    }

    function StatusBadge({ status }) {
      const s = status === 'completed'
        ? 'bg-green-500/20 text-green-400'
        : status === 'failed'
        ? 'bg-red-500/20 text-red-400'
        : 'bg-yellow-500/20 text-yellow-400';
      return (
        <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${s}`}>
          {status}
        </span>
      );
    }

    // === MAIN APP ===

    function App() {
      const [transactions, setTransactions] = useState([]);
      const [wallets, setWallets] = useState({
        treasury: 0,
        fixer: 0,
        escrow: 0,
        fees: 0,
      });
      const [isLive, setIsLive] = useState(false);
      const [lastUpdate, setLastUpdate] = useState(new Date());
      const [error, setError] = useState(null);

      const fetchData = useCallback(async () => {
        try {
          const res = await fetch(WEBHOOK_URL);
          if (res.ok) {
            const data = await res.json();
            if (data.transactions) setTransactions(data.transactions);
            if (data.wallets) setWallets(data.wallets);
            setIsLive(true);
            setError(null);
          } else {
            setIsLive(false);
            setError(`API returned ${res.status}`);
          }
        } catch (e) {
          setIsLive(false);
          setError('Cannot reach n8n webhook');
        }
        setLastUpdate(new Date());
      }, []);

      useEffect(() => {
        fetchData();
        const interval = setInterval(fetchData, POLL_INTERVAL);
        return () => clearInterval(interval);
      }, [fetchData]);

      // Computed stats
      const totalTxns = transactions.length;
      const failedAttempts = transactions.filter(t => t.failure_type !== 'NONE' && t.failure_type !== 'DIRECT').length;
      const fixed = transactions.filter(t => t.fix_applied !== 'DIRECT' && t.fix_applied !== 'NONE' && t.status === 'completed').length;
      const fixRate = failedAttempts > 0 ? Math.round((fixed / failedAttempts) * 100) : 0;
      const totalSettled = transactions.filter(t => t.status === 'completed').reduce((s, t) => s + (t.amount || 0), 0);
      const totalFees = transactions.filter(t => t.status === 'completed').reduce((s, t) => s + (t.fee || 0), 0);

      // Fix type breakdown for pie chart
      const fixCounts = transactions.reduce((acc, t) => {
        if (t.fix_applied && t.fix_applied !== 'DIRECT' && t.fix_applied !== 'NONE') {
          acc[t.fix_applied] = (acc[t.fix_applied] || 0) + 1;
        }
        return acc;
      }, {});

      const pieData = Object.entries(fixCounts).map(([name, value]) => ({ name, value }));
      const PIE_COLORS = ['#3b82f6', '#8b5cf6', '#f59e0b', '#22c55e'];

      // Timeline data for area chart
      const timelineMap = {};
      transactions.forEach(t => {
        const hour = t.timestamp.substring(11, 13) + ':00';
        if (!timelineMap[hour]) timelineMap[hour] = { time: hour, total: 0, fixed: 0 };
        timelineMap[hour].total++;
        if (t.fix_applied !== 'DIRECT' && t.fix_applied !== 'NONE' && t.status === 'completed') {
          timelineMap[hour].fixed++;
        }
      });
      const timelineData = Object.values(timelineMap).sort((a, b) => a.time.localeCompare(b.time));

      return (
        <div className="min-h-screen p-6 max-w-7xl mx-auto">
          {/* Header */}
          <div className="flex items-center justify-between mb-8">
            <div className="flex items-center gap-4">
              <div>
                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                  FinFix
                  <span className="text-sm font-normal bg-accent/20 text-accent px-2 py-0.5 rounded-full">
                    Dashboard
                  </span>
                </h1>
                <p className="text-gray-500 text-sm">Self-Healing Middleware for Agentic Commerce</p>
              </div>
            </div>
            <div className="flex items-center gap-3">
              <div className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-medium ${isLive ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}`}>
                <span className={`w-2 h-2 rounded-full ${isLive ? 'bg-green-400 pulse-dot' : 'bg-red-400'}`}></span>
                {isLive ? 'Live' : 'Disconnected'}
              </div>
              <span className="text-gray-600 text-xs mono">
                Updated: {lastUpdate.toLocaleTimeString()}
              </span>
            </div>
          </div>

          {/* Connection Error Banner */}
          {error && (
            <div className="mb-6 bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-3 flex items-center gap-3">
              <span className="text-red-400 text-sm font-medium">{error}</span>
              <span className="text-red-400/60 text-xs">Ensure n8n is running and the dashboard-data workflow is active at {WEBHOOK_URL}</span>
            </div>
          )}

          {/* Stats Row */}
          <div className="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
            <StatCard label="Total Transactions" value={totalTxns} icon="&#x1f4e6;" />
            <StatCard label="Failures Detected" value={failedAttempts} color="text-warning" icon="&#x26a0;" />
            <StatCard label="Auto-Fixed" value={fixed} color="text-success" subtext={`${fixRate}% fix rate`} icon="&#x2705;" />
            <StatCard label="USDC Settled" value={`$${totalSettled.toFixed(2)}`} color="text-accent" icon="&#x1f4b0;" />
            <StatCard label="Fees Earned" value={`$${totalFees.toFixed(2)}`} color="text-purple-400" subtext="2% per tx" icon="&#x1f4b8;" />
          </div>

          {/* Charts + Wallets Row */}
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-6">
            {/* Transaction Timeline */}
            <div className="lg:col-span-2 bg-card border border-border rounded-xl p-5">
              <h3 className="text-white font-semibold text-sm mb-4">Transaction Timeline</h3>
              <ResponsiveContainer width="100%" height={200}>
                <AreaChart data={timelineData}>
                  <defs>
                    <linearGradient id="colorTotal" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#6366f1" stopOpacity={0.3} />
                      <stop offset="95%" stopColor="#6366f1" stopOpacity={0} />
                    </linearGradient>
                    <linearGradient id="colorFixed" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="5%" stopColor="#22c55e" stopOpacity={0.3} />
                      <stop offset="95%" stopColor="#22c55e" stopOpacity={0} />
                    </linearGradient>
                  </defs>
                  <XAxis dataKey="time" stroke="#4a4d5a" fontSize={11} />
                  <YAxis stroke="#4a4d5a" fontSize={11} />
                  <Tooltip
                    contentStyle={{ background: '#1a1d27', border: '1px solid #2a2d3a', borderRadius: '8px', fontSize: '12px' }}
                    labelStyle={{ color: '#fff' }}
                  />
                  <Area type="monotone" dataKey="total" stroke="#6366f1" fill="url(#colorTotal)" name="Total" />
                  <Area type="monotone" dataKey="fixed" stroke="#22c55e" fill="url(#colorFixed)" name="Fixed" />
                </AreaChart>
              </ResponsiveContainer>
            </div>

            {/* Fix Type Breakdown */}
            <div className="bg-card border border-border rounded-xl p-5">
              <h3 className="text-white font-semibold text-sm mb-4">Fix Type Breakdown</h3>
              <ResponsiveContainer width="100%" height={160}>
                <PieChart>
                  <Pie data={pieData} cx="50%" cy="50%" innerRadius={40} outerRadius={65} paddingAngle={4} dataKey="value">
                    {pieData.map((entry, i) => (
                      <Cell key={i} fill={PIE_COLORS[i % PIE_COLORS.length]} />
                    ))}
                  </Pie>
                  <Tooltip
                    contentStyle={{ background: '#1a1d27', border: '1px solid #2a2d3a', borderRadius: '8px', fontSize: '12px' }}
                  />
                </PieChart>
              </ResponsiveContainer>
              <div className="flex flex-wrap gap-3 mt-2 justify-center">
                {pieData.map((entry, i) => (
                  <div key={i} className="flex items-center gap-1.5 text-xs">
                    <span className="w-2.5 h-2.5 rounded-full" style={{ background: PIE_COLORS[i] }}></span>
                    <span className="text-gray-400">{entry.name.replace('_', ' ')}: {entry.value}</span>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Wallets Row */}
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <WalletCard name="Treasury" balance={wallets.treasury} role="Master fund pool" />
            <WalletCard name="Fixer Agent" balance={wallets.fixer} role="Purchase executor" />
            <WalletCard name="Escrow" balance={wallets.escrow} role="Order fulfillment hold" />
            <WalletCard name="Fee Collector" balance={wallets.fees} role="2% service fee" />
          </div>

          {/* Transaction Log */}
          <div className="bg-card border border-border rounded-xl p-5">
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-white font-semibold text-sm">Transaction Log</h3>
              <span className="text-gray-500 text-xs">{transactions.length} transactions</span>
            </div>
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-border">
                    <th className="text-left text-gray-500 font-medium py-2 px-3 text-xs">Time</th>
                    <th className="text-left text-gray-500 font-medium py-2 px-3 text-xs">Product</th>
                    <th className="text-left text-gray-500 font-medium py-2 px-3 text-xs">Merchant</th>
                    <th className="text-left text-gray-500 font-medium py-2 px-3 text-xs">Fix</th>
                    <th className="text-right text-gray-500 font-medium py-2 px-3 text-xs">Amount</th>
                    <th className="text-left text-gray-500 font-medium py-2 px-3 text-xs">Tx Hash</th>
                    <th className="text-left text-gray-500 font-medium py-2 px-3 text-xs">Status</th>
                  </tr>
                </thead>
                <tbody>
                  {transactions.length === 0 ? (
                    <tr>
                      <td colSpan="7" className="py-12 text-center text-gray-500 text-sm">
                        No transactions yet. Send a purchase request to the webhook to get started.
                      </td>
                    </tr>
                  ) : (
                    [...transactions].reverse().slice(0, 20).map((tx, i) => (
                      <tr key={tx.id || i} className="border-b border-border/50 hover:bg-white/[0.02] transition-colors">
                        <td className="py-2.5 px-3 text-gray-400 mono text-xs whitespace-nowrap">
                          {new Date(tx.timestamp).toLocaleTimeString()}
                        </td>
                        <td className="py-2.5 px-3 text-white text-xs max-w-[200px] truncate">
                          {tx.product}
                        </td>
                        <td className="py-2.5 px-3 text-gray-400 text-xs">
                          {tx.merchant}
                        </td>
                        <td className="py-2.5 px-3">
                          <FixTypeBadge type={tx.fix_applied} />
                        </td>
                        <td className="py-2.5 px-3 text-right text-white mono text-xs">
                          ${(tx.amount || 0).toFixed(2)}
                        </td>
                        <td className="py-2.5 px-3 text-gray-500 mono text-xs max-w-[120px] truncate">
                          {tx.tx_hash || '\u2014'}
                        </td>
                        <td className="py-2.5 px-3">
                          <StatusBadge status={tx.status} />
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Footer */}
          <div className="text-center text-gray-600 text-xs mt-8 pb-4">
            FinFix &mdash; HAC Vibe Coding HACathon 2026 &mdash; Powered by Crossmint &amp; n8n
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
